# backup-targets.conf — Backup-Ziel Konfiguration
# Wird von backup.conf eingelesen (source backup.conf lädt automatisch beide)
# Pfad auf Proxmox-Host: /opt/openclaw/config/backup-targets.conf
#
# Hinweis: Sensible Zugangsdaten (Passwörter, Keys) gehören NICHT hier rein,
# sondern in /etc/backup-credentials (SMB) oder /root/.age/key.txt (age).

# ── USB-Festplatte vorbereiten ────────────────────────────────────────────────
# Formatieren und Label setzen (einmalig):
#   mkfs.ext4 -L OPENCLAW-BAK /dev/sdX
#   (oder für größere Kompatibilität: mkfs.vfat -n OPENCLAW-BAK /dev/sdX)
#
# Label prüfen:
#   blkid | grep OPENCLAW-BAK
#   lsblk -o NAME,LABEL,SIZE,FSTYPE

# ── GitHub-Backup-Repo ────────────────────────────────────────────────────────
# Separates PRIVATES Repository für verschlüsselte Config-Backups.
# NICHT das Haupt-Repo openclaw-proxmox verwenden!
#
# Einrichten:
#   1. Neues privates Repo auf GitHub: "openclaw-proxmox-configs"
#   2. SSH-Key für Proxmox-Host generieren:
#      ssh-keygen -t ed25519 -f /root/.ssh/github-backup -C "proxmox-backup"
#   3. Deploy Key in GitHub-Repo hinzufügen (Settings → Deploy keys → Write access)
#   4. SSH-Config:
#      echo "Host github-backup\n  HostName github.com\n  User git\n  IdentityFile /root/.ssh/github-backup" >> /root/.ssh/config
#   5. GITHUB_REPO in backup.conf anpassen:
#      GITHUB_REPO="git@github-backup:WaR10ck-2025/openclaw-proxmox-configs.git"
#
# Repo-Struktur nach erstem Backup:
#   openclaw-proxmox-configs/
#   ├── README.md
#   ├── latest/
#   │   ├── config-backup.tar.gz.age
#   │   └── answer.toml.age
#   └── archive/
#       └── YYYY-MM-DD/
#           └── config-backup.tar.gz.age

# ── Netzwerkfreigabe testen ────────────────────────────────────────────────────
# SMB-Mount testen:
#   mount -t cifs "//192.168.10.50/proxmox-backup" /mnt/test \
#     -o "credentials=/etc/backup-credentials,vers=3.0"
#   df -h /mnt/test
#   umount /mnt/test
#
# NFS-Mount testen:
#   mount -t nfs "192.168.10.50:/proxmox-backup" /mnt/test
#   df -h /mnt/test
#   umount /mnt/test

# ── Speicherplatz-Empfehlung ──────────────────────────────────────────────────
# Layer 1 (Configs):     ~500 MB für 30 Tage × ~15 MB/Backup
# Layer 2 (vzdump):      ~200 GB für 3 × alle prioritären LXCs (variiert stark)
# Layer 3 (App-Daten):   ~20 GB für 14 Tage × ~1.5 GB/Tag
# Gesamt empfohlen:      ~500 GB USB-Festplatte oder NAS-Share
