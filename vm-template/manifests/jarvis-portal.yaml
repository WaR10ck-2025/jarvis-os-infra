# jarvis-portal.yaml — Portal Deployment fuer k3s (ghcr.io Image)
# Wird automatisch von k3s angewendet wenn in /var/lib/rancher/k3s/server/manifests/
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jarvis-portal
  namespace: jarvis-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jarvis-portal
rules:
  - apiGroups: ["jarvis-os.io"]
    resources: ["jarvisapps", "jarvisapps/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jarvis-portal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jarvis-portal
subjects:
  - kind: ServiceAccount
    name: jarvis-portal
    namespace: jarvis-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-portal
  namespace: jarvis-system
  labels:
    app: jarvis-portal
    app.kubernetes.io/part-of: jarvis-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jarvis-portal
  template:
    metadata:
      labels:
        app: jarvis-portal
        app.kubernetes.io/part-of: jarvis-os
    spec:
      serviceAccountName: jarvis-portal
      containers:
        - name: portal
          image: ghcr.io/war10ck-2025/jarvis-portal:latest
          imagePullPolicy: Always
          env:
            - name: VM_MODE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-portal-config
                  key: VM_MODE
            - name: VM_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: jarvis-portal-config
                  key: VM_USERNAME
            - name: VM_PROFILE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-portal-config
                  key: VM_PROFILE
            - name: ADMIN_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-portal-config
                  key: ADMIN_SERVICE_URL
            - name: ADMIN_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: jarvis-portal-config
                  key: ADMIN_API_KEY
                  optional: true
            - name: CATALOG_PATH
              value: /opt/jarvis/catalog.json
            - name: APPS_NAMESPACE
              value: default
            # --- OIDC-Authentifizierung (Authentik) ---
            # ConfigMap jarvis-oidc-config wird vom Admin-Service/firstboot erstellt.
            # OIDC_ENABLED=false → Portal ohne Login nutzbar (default).
            # Spaeter aktivierbar: OIDC_ENABLED=true in der ConfigMap setzen.
            - name: OIDC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: OIDC_ENABLED
                  optional: true
            - name: OIDC_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: OIDC_CLIENT_SECRET
                  optional: true
            - name: OIDC_AUTHORIZE_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: OIDC_AUTHORIZE_URL
                  optional: true
            - name: OIDC_TOKEN_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: OIDC_TOKEN_URL
                  optional: true
            - name: OIDC_USERINFO_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: OIDC_USERINFO_URL
                  optional: true
            - name: OIDC_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: OIDC_REDIRECT_URI
                  optional: true
            - name: OIDC_DISCOVERY_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: OIDC_DISCOVERY_URL
                  optional: true
            - name: AUTHENTIK_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-oidc-config
                  key: AUTHENTIK_BASE_URL
                  optional: true
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: jarvis-data
              mountPath: /opt/jarvis
              readOnly: true
      volumes:
        - name: jarvis-data
          hostPath:
            path: /opt/jarvis
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: jarvis-portal
  namespace: jarvis-system
spec:
  type: NodePort
  selector:
    app: jarvis-portal
  ports:
    - port: 8080
      targetPort: http
      nodePort: 30080
      name: http
