# jarvis-monitoring.yaml — Prometheus + Grafana + Node-Exporter fuer Admin-VM
# NUR auf Admin-VM deployen (VM_MODE=admin), NICHT ins VM-Template!
# Wird manuell nach /var/lib/rancher/k3s/server/manifests/ kopiert.
---
# ── Namespace (jarvis-system existiert bereits) ──────────────────────────────
# ── Prometheus ConfigMap ─────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: jarvis-system
  labels:
    app: prometheus
    app.kubernetes.io/part-of: jarvis-os
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # Node-Exporter auf Admin-VM (System-Service, kein k8s Pod)
      - job_name: "admin-vm-node"
        static_configs:
          - targets: ["192.168.10.155:9100"]
            labels:
              vm: "admin"
              user: "admin"

      # Admin-Service (LXC 160)
      - job_name: "admin-service"
        metrics_path: /metrics
        static_configs:
          - targets: ["192.168.10.160:8300"]
            labels:
              service: "admin-service"

      # User-VMs statische Targets (via DNAT-IPs auf Proxmox-Host)
      # Schema: 192.168.10.{170+offset} → 10.{user_id}.0.10:9100
      - job_name: "user-vms"
        static_configs:
          - targets: ["192.168.10.170:9100"]
            labels:
              vm: "alice"
              user: "alice"
              vm_id: "1000"
              profile: "small"

      # User-VMs dynamisch via Admin-Service SD (ergaenzt statische)
      - job_name: "user-vms-sd"
        http_sd_configs:
          - url: "http://192.168.10.160:8300/api/v1/prometheus/targets"
            refresh_interval: 60s

      # k3s API-Server Metriken
      - job_name: "kubernetes-apiservers"
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # k3s Pods mit prometheus.io Annotations
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app
---
# ── Prometheus RBAC ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: jarvis-system
  labels:
    app.kubernetes.io/part-of: jarvis-os
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/part-of: jarvis-os
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/part-of: jarvis-os
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: jarvis-system
---
# ── Prometheus Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: jarvis-system
  labels:
    app: prometheus
    app.kubernetes.io/part-of: jarvis-os
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/part-of: jarvis-os
    spec:
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsNonRoot: true
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.3
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--storage.tsdb.retention.size=2GB"
            - "--web.enable-lifecycle"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          ports:
            - containerPort: 9090
              name: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          hostPath:
            path: /opt/jarvis/monitoring/prometheus-data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: jarvis-system
  labels:
    app: prometheus
    app.kubernetes.io/part-of: jarvis-os
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: http
      name: http
---
# ── Grafana Deployment ───────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: jarvis-system
  labels:
    app: grafana
    app.kubernetes.io/part-of: jarvis-os
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.jarvis-system.svc:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: jarvis-system
  labels:
    app: grafana
    app.kubernetes.io/part-of: jarvis-os
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: "J.A.R.V.I.S-OS"
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: jarvis-system
  labels:
    app: grafana
    app.kubernetes.io/part-of: jarvis-os
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/part-of: jarvis-os
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "jarvis-admin"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:30090"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          hostPath:
            path: /opt/jarvis/monitoring/grafana-data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: jarvis-system
  labels:
    app: grafana
    app.kubernetes.io/part-of: jarvis-os
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: http
      nodePort: 30090
      name: http
# Node-Exporter: Laeuft bereits als System-Service auf der VM (PID, Port 9100).
# Kein k8s DaemonSet noetig. Prometheus scrapt direkt 192.168.10.155:9100.
