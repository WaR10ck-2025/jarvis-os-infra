apiVersion: v1
kind: ConfigMap
metadata:
  name: jarvis-hardware-profiles
  namespace: jarvis-system
  labels:
    app.kubernetes.io/part-of: jarvis-os
    app.kubernetes.io/managed-by: jarvis-operator
data:
  # ---------------------------------------------------------------
  # Hardware-Kapazitaet des Clusters (anpassen pro Installation)
  # ---------------------------------------------------------------
  cluster.totalMemory: "16Gi"
  cluster.totalCPU: "8"
  cluster.reservedMemory: "2560Mi"
  cluster.reservedCPU: "2"

  # ---------------------------------------------------------------
  # Tenant-Profile (JSON): small / medium / large
  # Jedes Profil definiert ResourceQuota + LimitRange Defaults
  # ---------------------------------------------------------------
  profile.small: |
    {
      "displayName": "Small",
      "description": "Leichte Apps (IT-Tools, Excalidraw, Blogs)",
      "memoryLimit": "1Gi",
      "cpuLimit": "1",
      "storageQuota": "10Gi",
      "appSlotLimit": 3,
      "limitRange": {
        "defaultRequest": {"memory": "32Mi", "cpu": "25m"},
        "defaultLimit": {"memory": "192Mi", "cpu": "250m"},
        "maxLimit": {"memory": "384Mi", "cpu": "500m"}
      }
    }
  profile.medium: |
    {
      "displayName": "Medium",
      "description": "Standard: 2-3 Apps (Vaultwarden, FileBrowser, Uptime-Kuma)",
      "memoryLimit": "2Gi",
      "cpuLimit": "2",
      "storageQuota": "30Gi",
      "appSlotLimit": 5,
      "limitRange": {
        "defaultRequest": {"memory": "64Mi", "cpu": "50m"},
        "defaultLimit": {"memory": "256Mi", "cpu": "500m"},
        "maxLimit": {"memory": "512Mi", "cpu": "1"}
      }
    }
  profile.large: |
    {
      "displayName": "Large",
      "description": "Power-User: Viele Apps, groessere Workloads (n8n, Stirling-PDF)",
      "memoryLimit": "4Gi",
      "cpuLimit": "4",
      "storageQuota": "50Gi",
      "appSlotLimit": 10,
      "limitRange": {
        "defaultRequest": {"memory": "64Mi", "cpu": "50m"},
        "defaultLimit": {"memory": "512Mi", "cpu": "500m"},
        "maxLimit": {"memory": "1Gi", "cpu": "2"}
      }
    }
