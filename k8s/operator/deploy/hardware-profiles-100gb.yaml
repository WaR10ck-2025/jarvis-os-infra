apiVersion: v1
kind: ConfigMap
metadata:
  name: jarvis-hardware-profiles
  namespace: jarvis-system
  labels:
    app.kubernetes.io/part-of: jarvis-os
    app.kubernetes.io/managed-by: jarvis-operator
data:
  # ---------------------------------------------------------------
  # Hardware-Kapazitaet: Grosser Server (~100 GB RAM, 32 vCPUs)
  # ---------------------------------------------------------------
  cluster.totalMemory: "100Gi"
  cluster.totalCPU: "32"
  cluster.reservedMemory: "4Gi"
  cluster.reservedCPU: "4"

  # ---------------------------------------------------------------
  # Tenant-Profile (grosszuegiger als 16 GB Variante)
  # ---------------------------------------------------------------
  profile.small: |
    {
      "displayName": "Small",
      "description": "Leichte Apps, Einsteiger",
      "memoryLimit": "4Gi",
      "cpuLimit": "2",
      "storageQuota": "50Gi",
      "appSlotLimit": 5,
      "limitRange": {
        "defaultRequest": {"memory": "64Mi", "cpu": "50m"},
        "defaultLimit": {"memory": "512Mi", "cpu": "500m"},
        "maxLimit": {"memory": "1Gi", "cpu": "1"}
      }
    }
  profile.medium: |
    {
      "displayName": "Medium",
      "description": "Standard-User: Mehrere Apps und moderate Workloads",
      "memoryLimit": "8Gi",
      "cpuLimit": "4",
      "storageQuota": "100Gi",
      "appSlotLimit": 10,
      "limitRange": {
        "defaultRequest": {"memory": "128Mi", "cpu": "100m"},
        "defaultLimit": {"memory": "1Gi", "cpu": "1"},
        "maxLimit": {"memory": "2Gi", "cpu": "2"}
      }
    }
  profile.large: |
    {
      "displayName": "Large",
      "description": "Power-User: Grosse Workloads, DB-Cluster, CI/CD",
      "memoryLimit": "16Gi",
      "cpuLimit": "8",
      "storageQuota": "200Gi",
      "appSlotLimit": 20,
      "limitRange": {
        "defaultRequest": {"memory": "128Mi", "cpu": "100m"},
        "defaultLimit": {"memory": "2Gi", "cpu": "1"},
        "maxLimit": {"memory": "4Gi", "cpu": "4"}
      }
    }
