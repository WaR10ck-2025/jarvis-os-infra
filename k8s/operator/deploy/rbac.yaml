apiVersion: v1
kind: ServiceAccount
metadata:
  name: jarvis-operator
  namespace: jarvis-system
  labels:
    app.kubernetes.io/name: jarvis-operator
    app.kubernetes.io/part-of: jarvis-os
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jarvis-operator
  labels:
    app.kubernetes.io/name: jarvis-operator
    app.kubernetes.io/part-of: jarvis-os
rules:
  # CRDs lesen (kopf braucht das)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # JarvisTenant + JarvisApp verwalten
  - apiGroups: ["jarvis-os.io"]
    resources: ["jarvistenants", "jarvistenants/status", "jarvisapps", "jarvisapps/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespaces verwalten (Tenant-Lifecycle)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # ResourceQuotas + Services + PVCs verwalten
  - apiGroups: [""]
    resources: ["resourcequotas", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Deployments verwalten (App-Lifecycle)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # NetworkPolicies + Ingresses verwalten
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events erstellen (kopf Status-Updates)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # kopf Koordination (Leader Election)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jarvis-operator
  labels:
    app.kubernetes.io/name: jarvis-operator
    app.kubernetes.io/part-of: jarvis-os
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jarvis-operator
subjects:
  - kind: ServiceAccount
    name: jarvis-operator
    namespace: jarvis-system
