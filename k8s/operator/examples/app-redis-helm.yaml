apiVersion: jarvis-os.io/v1
kind: JarvisApp
metadata:
  name: redis
  namespace: user-alice
spec:
  appId: Redis
  helmChart: oci://registry-1.docker.io/bitnamicharts/redis
  port: 6379
  ingress:
    enabled: false
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  helmValues:
    architecture: standalone
    auth:
      enabled: false
    master:
      persistence:
        size: 1Gi
    replica:
      replicaCount: 0
