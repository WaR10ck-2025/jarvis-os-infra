apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: jarvistenants.jarvis-os.io
spec:
  group: jarvis-os.io
  names:
    kind: JarvisTenant
    listKind: JarvisTenantList
    plural: jarvistenants
    singular: jarvistenant
    shortNames:
      - jt
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["username"]
              properties:
                username:
                  type: string
                  pattern: "^[a-z][a-z0-9-]{1,30}[a-z0-9]$"
                  description: "Lowercase username, wird zu Namespace user-{username}"
                profile:
                  type: string
                  enum: ["small", "medium", "large"]
                  default: "medium"
                  description: "Hardware-Profil (definiert Quotas/Limits via ConfigMap)"
                storageQuota:
                  type: string
                  description: "Max Storage (ueberschreibt Profil-Default)"
                cpuLimit:
                  type: string
                  description: "Max CPU-Cores (ueberschreibt Profil-Default)"
                memoryLimit:
                  type: string
                  description: "Max RAM (ueberschreibt Profil-Default)"
                appSlotLimit:
                  type: integer
                  minimum: 1
                  maximum: 50
                  description: "Max Anzahl JarvisApps (ueberschreibt Profil-Default)"
                tailscaleEnabled:
                  type: boolean
                  default: false
                  description: "Headscale-User + Namespace anlegen"
                dashboardEnabled:
                  type: boolean
                  default: true
                  description: "CasaOS-artiges Dashboard deployen"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Ready", "Error", "Deleting"]
                namespace:
                  type: string
                profile:
                  type: string
                message:
                  type: string
                appCount:
                  type: integer
                lastUpdated:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Username
          type: string
          jsonPath: .spec.username
        - name: Profile
          type: string
          jsonPath: .spec.profile
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Namespace
          type: string
          jsonPath: .status.namespace
        - name: Apps
          type: integer
          jsonPath: .status.appCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
