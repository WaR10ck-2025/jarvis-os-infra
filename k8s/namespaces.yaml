    app.kubernetes.io/part-of: jarvis-os
    jarvis-os.io/tier: infrastructure
---
apiVersion: v1
kind: Namespace
metadata:
  name: jarvis-system
  labels:
    app.kubernetes.io/part-of: jarvis-os
    jarvis-os.io/tier: system
