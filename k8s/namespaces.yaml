apiVersion: v1
kind: Namespace
metadata:
  name: jarvis-apps
  labels:
    app.kubernetes.io/part-of: jarvis-os
    jarvis-os.io/tier: applications
---
apiVersion: v1
kind: Namespace
metadata:
  name: jarvis-infra
