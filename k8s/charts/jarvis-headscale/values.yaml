image:
  repository: headscale/headscale
  tag: "0.28.0"

config:
  serverUrl: "http://headscale.k8s.jarvis.local"
  listenAddr: "0.0.0.0:8080"
  metricsAddr: "0.0.0.0:9090"
  derpIpv4: "192.168.10.150"
  baseDomain: "vpn.jarvis.local"
  nameservers:
    - "1.1.1.1"
    - "8.8.8.8"

persistence:
  size: 1Gi
  storageClass: local-path

ingress:
  host: headscale.k8s.jarvis.local

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "500m"
