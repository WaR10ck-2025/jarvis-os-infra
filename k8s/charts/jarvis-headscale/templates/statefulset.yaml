apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    server_url: {{ .Values.config.serverUrl }}
    listen_addr: {{ .Values.config.listenAddr }}
    metrics_listen_addr: {{ .Values.config.metricsAddr }}
    private_key_path: /var/lib/headscale/private.key
    noise:
      private_key_path: /var/lib/headscale/noise_private.key
    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential
    derp:
      server:
        enabled: true
        region_id: 999
        region_code: headscale
        region_name: Headscale Embedded DERP
        stun_listen_addr: 0.0.0.0:3478
        private_key_path: /var/lib/headscale/derp_server_private.key
        automatically_add_embedded_derp_region: true
        ipv4: {{ .Values.config.derpIpv4 }}
      urls: []
      auto_update_enabled: false
      update_frequency: 24h
    disable_check_updates: true
    ephemeral_node_inactivity_timeout: 30m
    dns:
      override_local_dns: false
      nameservers:
        global:
        {{- range .Values.config.nameservers }}
          - {{ . }}
        {{- end }}
      base_domain: {{ .Values.config.baseDomain }}
    database:
      type: sqlite3
      sqlite:
        path: /var/lib/headscale/db.sqlite
    log:
      level: info
    policy:
      path: ""
      mode: file
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: headscale
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: headscale
    app.kubernetes.io/component: vpn
    app.kubernetes.io/part-of: jarvis-os
spec:
  serviceName: headscale
  replicas: 1
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        app: headscale
    spec:
      containers:
      - name: headscale
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["headscale", "serve"]
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        - containerPort: 3478
          name: stun
          protocol: UDP
        volumeMounts:
        - name: headscale-data
          mountPath: /var/lib/headscale
        - name: headscale-config
          mountPath: /etc/headscale/config.yaml
          subPath: config.yaml
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: headscale-config
        configMap:
          name: headscale-config
  volumeClaimTemplates:
  - metadata:
      name: headscale-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.persistence.storageClass }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: headscale
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: headscale
  ports:
  - port: 8080
    targetPort: http
    name: http
  - port: 9090
    targetPort: metrics
    name: metrics
  - port: 3478
    targetPort: stun
    name: stun
    protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headscale
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: headscale
            port:
              number: 8080
