# grafana.yaml — Grafana Deployment fuer Admin-VM
#
# Zentrale Dashboards fuer den Admin.
# Datasource: Prometheus (jarvis-system/prometheus:9090)
# Login: admin / jarvis-admin (beim ersten Start aendern!)
#
# Pfad in VM-Template: /var/lib/rancher/k3s/server/manifests/grafana.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: jarvis-system
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.jarvis-system.svc:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: jarvis-system
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: J.A.R.V.I.S-OS
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster
  namespace: jarvis-system
  labels:
    app: grafana
data:
  cluster-overview.json: |
    {
      "dashboard": {
        "title": "J.A.R.V.I.S-OS Cluster",
        "tags": ["jarvis-os"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Aktive User-VMs",
            "type": "stat",
            "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
            "targets": [{"expr": "count(up{job=\"user-vms\"} == 1)", "legendFormat": "VMs"}],
            "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": null}]}}}
          },
          {
            "title": "Proxmox Host CPU",
            "type": "gauge",
            "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
            "targets": [{"expr": "100 - (avg(rate(node_cpu_seconds_total{job=\"proxmox-host\",mode=\"idle\"}[5m])) * 100)", "legendFormat": "CPU %"}],
            "fieldConfig": {"defaults": {"max": 100, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 65}, {"color": "red", "value": 85}]}}}
          },
          {
            "title": "Proxmox Host RAM",
            "type": "gauge",
            "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
            "targets": [{"expr": "(1 - node_memory_MemAvailable_bytes{job=\"proxmox-host\"} / node_memory_MemTotal_bytes{job=\"proxmox-host\"}) * 100", "legendFormat": "RAM %"}],
            "fieldConfig": {"defaults": {"max": 100, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 65}, {"color": "red", "value": 85}]}}}
          },
          {
            "title": "User-VM CPU (pro User)",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
            "targets": [{"expr": "100 - (avg by (user) (rate(node_cpu_seconds_total{job=\"user-vms\",mode=\"idle\"}[5m])) * 100)", "legendFormat": "{{user}}"}]
          },
          {
            "title": "User-VM RAM (pro User)",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
            "targets": [{"expr": "(1 - node_memory_MemAvailable_bytes{job=\"user-vms\"} / node_memory_MemTotal_bytes{job=\"user-vms\"}) * 100", "legendFormat": "{{user}}"}]
          }
        ],
        "schemaVersion": 39,
        "version": 1
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: jarvis-system
  labels:
    app: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: jarvis-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "jarvis-admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.jarvis.local"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-cluster
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboard-cluster
          configMap:
            name: grafana-dashboard-cluster
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: jarvis-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: jarvis-system
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: jarvis-system
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.jarvis.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
