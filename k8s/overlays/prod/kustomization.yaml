# J.A.R.V.I.S-OS Produktions-Overlay (Neuer Server, Phase 4+)
# Voraussetzung: Neuer k3s-Node mit ~100GB RAM, Calico, OpenEBS ZFS CSI
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../  # Base (k8s/ Root-Verzeichnis)

# Prod-spezifische Labels
commonLabels:
  jarvis-os.io/environment: production

# Prod: StorageClass auf OpenEBS ZFS umstellen
patches:
  # n8n PVC: ZFS statt local-path
  - target:
      kind: StatefulSet
      name: n8n
    patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: openebs-zfs

  # deployment-hub PVC: ZFS statt local-path
  - target:
      kind: PersistentVolumeClaim
      name: deployment-hub-data
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: openebs-zfs

  # Websites: Replicas hochskalieren
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/component=website
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
