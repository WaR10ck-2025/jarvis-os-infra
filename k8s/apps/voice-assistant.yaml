# Voice Assistant (Python FastAPI + Whisper STT)
# Migriert von: LXC 103 (192.168.10.103:8000)
# Rollback: NPM Proxy-Host zurueck auf 192.168.10.103
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-assistant
  namespace: jarvis-apps
  labels:
    app.kubernetes.io/name: voice-assistant
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-assistant
  template:
    metadata:
      labels:
        app: voice-assistant
    spec:
      containers:
      - name: api
        image: ghcr.io/war10ck-2025/ki-voice-asistent:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - secretRef:
            name: voice-assistant-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: voice-assistant
  namespace: jarvis-apps
spec:
  selector:
    app: voice-assistant
  ports:
  - port: 8000
    targetPort: http
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-assistant
  namespace: jarvis-apps
spec:
  ingressClassName: nginx
  rules:
  - host: voice-assistant.k8s.jarvis.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: voice-assistant
            port:
              number: 8000
