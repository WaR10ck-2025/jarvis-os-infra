# Setup & Repair Agent (Python FastAPI)
# Migriert von: LXC 101 (192.168.10.101:8007)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: setup-repair
  namespace: jarvis-apps
  labels:
    app.kubernetes.io/name: setup-repair
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: setup-repair
  template:
    metadata:
      labels:
        app: setup-repair
    spec:
      containers:
      - name: api
        image: ghcr.io/war10ck-2025/setup-repair-agent:latest
        ports:
        - containerPort: 8007
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: setup-repair
  namespace: jarvis-apps
spec:
  selector:
    app: setup-repair
  ports:
  - port: 8007
    targetPort: http
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: setup-repair
  namespace: jarvis-apps
spec:
  ingressClassName: nginx
  rules:
  - host: setup-repair.k8s.jarvis.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: setup-repair
            port:
              number: 8007
