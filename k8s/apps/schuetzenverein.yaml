# Schuetzenverein Website (React + Nginx)
# Migriert von: LXC 106 (192.168.10.106:3002)
# Rollback: NPM Proxy-Host zurueck auf 192.168.10.106
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schuetzenverein
  namespace: jarvis-apps
  labels:
    app.kubernetes.io/name: schuetzenverein
    app.kubernetes.io/component: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schuetzenverein
  template:
    metadata:
      labels:
        app: schuetzenverein
    spec:
      containers:
      - name: web
        image: ghcr.io/war10ck-2025/schuetzenverein:latest
        ports:
        - containerPort: 3002
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: schuetzenverein
  namespace: jarvis-apps
spec:
  selector:
    app: schuetzenverein
  ports:
  - port: 3002
    targetPort: http
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: schuetzenverein
  namespace: jarvis-apps
spec:
  ingressClassName: nginx
  rules:
  - host: schuetzenverein.k8s.jarvis.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: schuetzenverein
            port:
              number: 3002
