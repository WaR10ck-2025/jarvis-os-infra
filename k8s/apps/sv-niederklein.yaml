# SV Niederklein — Vereinswebsite (React + Nginx)
# Migriert von: LXC 105 (192.168.10.105:3001)
# Rollback: NPM Proxy-Host zurueck auf 192.168.10.105
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-niederklein
  namespace: jarvis-apps
  labels:
    app.kubernetes.io/name: sv-niederklein
    app.kubernetes.io/component: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sv-niederklein
  template:
    metadata:
      labels:
        app: sv-niederklein
    spec:
      containers:
      - name: web
        image: ghcr.io/war10ck-2025/sv-niederklein:latest
        ports:
        - containerPort: 3001
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sv-niederklein
  namespace: jarvis-apps
spec:
  selector:
    app: sv-niederklein
  ports:
  - port: 3001
    targetPort: http
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sv-niederklein
  namespace: jarvis-apps
spec:
  ingressClassName: nginx
  rules:
  - host: sv-niederklein.k8s.jarvis.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sv-niederklein
            port:
              number: 3001
