# GitHub Deployment Connector (Python FastAPI + SQLite)
# Migriert von: LXC 170 (192.168.10.170:8100)
# Rollback: NPM Proxy-Host zurueck auf 192.168.10.170
# HINWEIS: GitHub Webhooks muessen nach Migration umgeleitet werden
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-hub
  namespace: jarvis-apps
  labels:
    app.kubernetes.io/name: deployment-hub
    app.kubernetes.io/component: ci-cd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployment-hub
  template:
    metadata:
      labels:
        app: deployment-hub
    spec:
      containers:
      - name: hub
        image: ghcr.io/war10ck-2025/github-deployment-connector:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - secretRef:
            name: deployment-hub-secrets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: hub-data
          mountPath: /app/data
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: hub-data
        persistentVolumeClaim:
          claimName: deployment-hub-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deployment-hub-data
  namespace: jarvis-apps
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: deployment-hub
  namespace: jarvis-apps
spec:
  selector:
    app: deployment-hub
  ports:
  - port: 8000
    targetPort: http
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deployment-hub
  namespace: jarvis-apps
spec:
  ingressClassName: nginx
  rules:
  - host: deploy.k8s.jarvis.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: deployment-hub
            port:
              number: 8000
