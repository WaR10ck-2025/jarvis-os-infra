# n8n Workflow Automation (StatefulSet mit PVC + SQLite)
# Migriert von: LXC 104 (192.168.10.104:5678)
# Rollback: NPM Proxy-Host zurueck auf 192.168.10.104
# WICHTIG: N8N_ENCRYPTION_KEY muss identisch mit LXC sein (sonst Credential-Verlust)
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: n8n
  namespace: jarvis-apps
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: automation
spec:
  serviceName: n8n
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
      - name: n8n
        image: n8nio/n8n:latest
        ports:
        - containerPort: 5678
          name: http
        envFrom:
        - secretRef:
            name: n8n-secrets
        env:
        - name: N8N_HOST
          value: "0.0.0.0"
        - name: N8N_PORT
          value: "5678"
        - name: N8N_PROTOCOL
          value: "http"
        - name: WEBHOOK_URL
          value: "http://n8n.k8s.jarvis.local/"
        - name: GENERIC_TIMEZONE
          value: "Europe/Berlin"
        - name: TZ
          value: "Europe/Berlin"
        volumeMounts:
        - name: n8n-data
          mountPath: /home/node/.n8n
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: n8n-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: jarvis-apps
spec:
  selector:
    app: n8n
  ports:
  - port: 5678
    targetPort: http
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: jarvis-apps
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
  - host: n8n.k8s.jarvis.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: n8n
            port:
              number: 5678
