# Headscale VPN Control Server (StatefulSet mit PVC)
# Migriert von: LXC 115 (192.168.10.115:8080)
# Rollback: NPM Proxy-Host zurueck auf 192.168.10.115, LXC starten
# WICHTIG: Private Keys muessen identisch mit LXC sein (sonst Node-Verlust)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: jarvis-infra
data:
  config.yaml: |
    server_url: http://headscale.k8s.jarvis.local
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090

    private_key_path: /var/lib/headscale/private.key
    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential

    derp:
      server:
        enabled: true
        region_id: 999
        region_code: headscale
        region_name: Headscale Embedded DERP
        stun_listen_addr: 0.0.0.0:3478
        private_key_path: /var/lib/headscale/derp_server_private.key
        automatically_add_embedded_derp_region: true
        ipv4: 192.168.10.150
      urls: []
      auto_update_enabled: false
      update_frequency: 24h

    disable_check_updates: true
    ephemeral_node_inactivity_timeout: 30m

    dns:
      override_local_dns: false
      nameservers:
        global:
          - 1.1.1.1
          - 8.8.8.8
      base_domain: vpn.jarvis.local

    database:
      type: sqlite3
      sqlite:
        path: /var/lib/headscale/db.sqlite

    log:
      level: info

    policy:
      path: ""
      mode: file
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: headscale
  namespace: jarvis-infra
  labels:
    app.kubernetes.io/name: headscale
    app.kubernetes.io/component: vpn
spec:
  serviceName: headscale
  replicas: 1
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        app: headscale
    spec:
      containers:
      - name: headscale
        image: headscale/headscale:0.28.0
        command: ["headscale", "serve"]
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        - containerPort: 3478
          name: stun
          protocol: UDP
        volumeMounts:
        - name: headscale-data
          mountPath: /var/lib/headscale
        - name: headscale-config
          mountPath: /etc/headscale/config.yaml
          subPath: config.yaml
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: headscale-config
        configMap:
          name: headscale-config
  volumeClaimTemplates:
  - metadata:
      name: headscale-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: headscale
  namespace: jarvis-infra
spec:
  selector:
    app: headscale
  ports:
  - port: 8080
    targetPort: http
    name: http
  - port: 9090
    targetPort: metrics
    name: metrics
  - port: 3478
    targetPort: stun
    name: stun
    protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headscale
  namespace: jarvis-infra
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
  - host: headscale.k8s.jarvis.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: headscale
            port:
              number: 8080
