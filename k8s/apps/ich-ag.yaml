# ICH-AG Website (React + Nginx)
# Neu auf k3s deployed (kein LXC-Vorgaenger)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ich-ag
  namespace: jarvis-apps
  labels:
    app.kubernetes.io/name: ich-ag
    app.kubernetes.io/component: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ich-ag
  template:
    metadata:
      labels:
        app: ich-ag
    spec:
      containers:
      - name: web
        image: ghcr.io/war10ck-2025/ich-ag-website:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ich-ag
  namespace: jarvis-apps
spec:
  selector:
    app: ich-ag
  ports:
  - port: 80
    targetPort: http
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ich-ag
  namespace: jarvis-apps
spec:
  ingressClassName: nginx
  rules:
  - host: ich-ag.k8s.jarvis.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ich-ag
            port:
              number: 80
